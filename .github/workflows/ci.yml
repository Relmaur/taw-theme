name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          tools: composer:v2
          coverage: none

      - name: Validate composer.json
        run: composer validate --no-check-all --no-check-publish

      - name: Authenticate composer with GitHub
        # taw/core is installed from a VCS (github.com) repository, not
        # Packagist — Composer's GitHub driver uses the GitHub API to
        # resolve tags/refs, and unauthenticated API access is capped at
        # 60 requests/hour PER IP. Actions runners share IPs across
        # countless concurrent workflows worldwide, so that cap is hit
        # constantly without this. GITHUB_TOKEN is provided free by
        # Actions and raises the limit to 5000/hour — no repo secret needed.
        run: composer config -g github-oauth.github.com "${{ secrets.GITHUB_TOKEN }}"

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: PHP lint (php -l on every file)
        run: |
          find . -name "*.php" \
            -not -path "./vendor/*" \
            -not -path "./node_modules/*" \
            -print0 | xargs -0 -n1 -P4 php -l

      - name: MetaBlock getData() signature check
        run: php bin/ci/check-getdata-signature.php
